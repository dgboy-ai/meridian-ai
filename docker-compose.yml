# Meridian AI — Full Stack with Real DataHub
#
# Quick Start (no Docker):
#   pip install -e . && meridian investigate "urn:li:mlModel:(urn:li:dataPlatform:mlflow,churn_model_v3,PROD)"
#
# Full Stack with DataHub:
#   1. Start Docker Desktop
#   2. docker compose up -d
#   3. Wait ~90s for DataHub to initialize
#   4. python scripts/seed_meridian.py
#   5. Visit http://localhost:9002 (DataHub UI) — login: datahub / datahub
#   6. Visit http://localhost:8000/docs (Meridian API)
#
# DataHub services: MySQL, Kafka, Zookeeper, Elasticsearch, GMS, Frontend, Actions
# Meridian services: backend-api, frontend

services:
  # ── DataHub Infrastructure ──────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: datahub
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  elasticsearch:
    image: elasticsearch:7.17.9
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"

  # ── DataHub Services ────────────────────────────────────────────────────

  datahub-gms:
    image: acryldata/datahub-gms:v0.14.0
    ports:
      - "8080:8080"
    environment:
      - DATAHUB_SECRET=gms-secret-key
      - DATAHUB_APP_PORT=8080
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://kafka:8081
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USERNAME=datahub
      - MYSQL_PASSWORD=datahub
      - DATAHUB_ANALYTICS_ENABLED=false
      - JAVA_OPTS=-Xms512m -Xmx512m
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.14.0
    ports:
      - "9002:9002"
    environment:
      - DATAHUB_GMS_URL=http://datahub-gms:8080
      - DATAHUB_APP_PORT=9002
      - DATAHUB_AUTH_COOKIE_CONFIG_SECRET=datahub-frontend-secret
      - DATAHUB_IDENTITY_PROVIDER_OPENID_CLIENT_ID=datahub-frontend
      - DATAHUB_IDENTITY_PROVIDER_OPENID_CLIENT_SECRET=datahub-frontend-secret
      - DATAHUB_IDENTITY_PROVIDER_OPENID_ISSUER_URL=http://datahub-gms:8080/api/gms/openid-configuration
    depends_on:
      datahub-gms:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Meridian AI Services ────────────────────────────────────────────────

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env.secrets
        required: false
    environment:
      - DATAHUB_MOCK=false
      - DATAHUB_GMS_URL=http://datahub-gms:8080/api/gms
      - LOG_LEVEL=INFO
    depends_on:
      datahub-gms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend-api:8000
    depends_on:
      backend-api:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  mysql-data:
  es-data:
